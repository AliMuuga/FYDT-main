<!-- HEADER -->
<header>
  <!-- Mode toggle button (sun/moon SVG) - far left -->
  <div class="mode-toggle" id="modeToggle">
    <!-- Sun SVG (visible when in dark mode) -->
    <svg class="sun-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="5"/>
      <g stroke="#ffa500" stroke-width="2" stroke-linecap="round">
        <line x1="12" y1="1" x2="12" y2="4"/>
        <line x1="12" y1="20" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/>
        <line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="4" y2="12"/>
        <line x1="20" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/>
        <line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/>
      </g>
    </svg>

    <!-- Moon SVG (visible when in light mode) -->
    <svg class="moon-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </div>

  <!-- Logo centered -->
  <div class="logo-container">
    <a href="Index.html"><img src="images/FYDT/LOGO.png" class="logo" alt="FYDT Logo"></a>
  </div>

  <nav>
    <a href="models.html">Models</a>
    <a href="posters.html">Posters</a>
    <a href="clothing.html">Clothing</a>
  </nav>

  <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
</header>

<!-- HERO SECTION -->
<section class="hero">
  <video autoplay muted loop class="scene active">

  </video>
  <video autoplay muted loop class="scene">
    <source src="videos/scene2.mp4" type="video/mp4">
  </video>
  <video autoplay muted loop class="scene">
    <source src="videos/scene3.mp4" type="video/mp4">
