<!DOCTYPE html>
<html lang="en">
<head>

<link rel="stylesheet" href="style.css">

<body>

<!-- CUSTOM CURSOR -->
<div class="cursor"></div>

<!-- HEADER -->
<header>

  <nav>

      <div class="sun"></div>

<!-- PAGE TITLE -->
<h1 style="padding-top:120px;text-align:center;">Posters</h1>
<p style="text-align:center;color:#888;margin-top:10px;">The visual artists</p>

<div class="grid">

  <!-- POSTER 2 -->
  <div class="card morph-target">
    <img src="images/Posters/Panda-(1).jpg" class="variant-img" style="display:block">

  </div>

  <div class="card morph-target">
    <img src="images/Posters/Pana-(1).jpg" class="variant-img" style="display:block">

  <div class="card morph-target">
    <img src="images/Posters/GWSM-(1).jpg" class="variant-img" style="display:block">

    <img src="images/Posters/GWSM-(4).jpg" class="variant-img">

<!-- GLITCH TRANSITION -->
<div class="glitch-transition"></div>

<!-- SCRIPT -->
<script src="script.js"></script>
